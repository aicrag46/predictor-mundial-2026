<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#141418" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Predictor Parque Biológico — Mundial 2026</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="stylesheet" href="css/style.css?v=10" />
</head>
<body>

<!-- ─── LOGIN ─────────────────────────────────────────────────────────────── -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-badge">🏆 FIFA World Cup 2026</div>
    <h2 class="login-title">Predictor Parque Biológico</h2>
    <p class="login-sub">🇺🇸 🇨🇦 🇲🇽 · Painel privado</p>
    <div id="login-error" class="login-error" style="display:none"></div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="o-teu@email.com" autocomplete="email" />
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="login-btn" onclick="doLogin()" id="login-btn">
      <span>Entrar</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <p class="login-note" id="login-note">A verificar sessão…</p>
  </div>
</div>

<div id="pull-indicator" class="pull-indicator">↻ Sincronizar</div>

<div class="app-shell">

  <header class="app-header">
    <div class="header-brand">
      <span class="brand-icon">🏆</span>
      <div class="brand-text">
        <h1>Predictor <em>2026</em></h1>
        <p class="brand-sub">Parque Biológico · 10 jogadores · 72 jogos</p>
      </div>
    </div>

    <div class="header-toolbar">
      <span id="api-status" class="api-status" style="display:none"></span>
      <button class="btn-icon btn-sync" id="btn-sync" onclick="apiFetch()" title="Sincronizar resultados">
        <span class="btn-icon-svg">🔄</span><span class="btn-label">Sync</span>
      </button>
      <span id="header-user" class="header-user" style="display:none"></span>
      <div class="header-menu">
        <button class="btn-icon btn-menu-toggle" id="menu-toggle" onclick="toggleHeaderMenu()" aria-label="Menu">⋮</button>
        <div class="header-dropdown" id="header-dropdown">
          <button class="dropdown-item danger" onclick="resetResultados();toggleHeaderMenu()">🗑️ Reset Grupos</button>
          <button class="dropdown-item danger" onclick="resetMataMata();toggleHeaderMenu()">🗑️ Reset Mata-Mata</button>
          <button class="dropdown-item" id="btn-logout" onclick="doLogout();toggleHeaderMenu()" style="display:none">🚪 Sair</button>
        </div>
      </div>
    </div>
  </header>

  <nav class="tabs-nav" aria-label="Navegação principal">
    <div class="tabs-track">
      <button class="tab-btn active" data-tab="resultados"    onclick="switchTab('resultados')"><span class="tab-icon">⚽</span><span class="tab-label">Resultados</span></button>
      <button class="tab-btn"        data-tab="classificacao" onclick="switchTab('classificacao')"><span class="tab-icon">🏅</span><span class="tab-label">Classificação</span></button>
      <button class="tab-btn"        data-tab="revisao"       onclick="switchTab('revisao')"><span class="tab-icon">📊</span><span class="tab-label">Revisão</span></button>
      <button class="tab-btn"        data-tab="grupos"        onclick="switchTab('grupos')"><span class="tab-icon">🗂️</span><span class="tab-label">Grupos</span></button>
      <button class="tab-btn"        data-tab="matamata"      onclick="switchTab('matamata')"><span class="tab-icon">⚔️</span><span class="tab-label">Mata-Mata</span></button>
      <button class="tab-btn"        data-tab="previsoes"     onclick="switchTab('previsoes')"><span class="tab-icon">🔮</span><span class="tab-label">Previsões</span></button>
      <button class="tab-btn"        data-tab="regras"        onclick="switchTab('regras')"><span class="tab-icon">📖</span><span class="tab-label">Regras</span></button>
      <button class="tab-btn"        data-tab="whatsapp"      onclick="switchTab('whatsapp')"><span class="tab-icon">💬</span><span class="tab-label">WhatsApp</span></button>
    </div>
  </nav>

  <main class="main-content">

    <div class="tab-content active" id="tab-resultados">
      <div id="resultados-content" class="resultados-list"></div>
    </div>

    <div class="tab-content" id="tab-classificacao">
      <div id="classificacao-content"></div>
    </div>

    <div class="tab-content" id="tab-revisao">
      <div id="revisao-content"></div>
    </div>

    <div class="tab-content" id="tab-grupos">
      <div id="grupos-content"></div>
    </div>

    <div class="tab-content" id="tab-matamata">
      <div id="matamata-content"></div>
    </div>

    <div class="tab-content" id="tab-previsoes">
      <div id="previsoes-content"></div>
    </div>

    <div class="tab-content" id="tab-regras">
      <div id="regras-content"></div>
    </div>

    <div class="tab-content" id="tab-whatsapp">
      <div id="whatsapp-content"></div>
    </div>

  </main>

  <!-- Bottom nav mobile -->
  <nav class="mobile-nav" aria-label="Navegação rápida">
    <button class="mobile-nav-btn active" data-tab="resultados"    onclick="switchTab('resultados')"><span>⚽</span><small>Resultados</small></button>
    <button class="mobile-nav-btn"        data-tab="classificacao" onclick="switchTab('classificacao')"><span>🏅</span><small>Classif.</small></button>
    <button class="mobile-nav-btn"        data-tab="revisao"       onclick="switchTab('revisao')"><span>📊</span><small>Revisão</small></button>
    <button class="mobile-nav-btn"        data-tab="matamata"      onclick="switchTab('matamata')"><span>⚔️</span><small>M-Mata</small></button>
    <button class="mobile-nav-btn"        data-tab="more"          onclick="openMobileMore()"><span>⋯</span><small>Mais</small></button>
  </nav>

  <!-- Sheet "Mais" mobile -->
  <div class="mobile-sheet-overlay" id="mobile-sheet" onclick="if(event.target===this)closeMobileMore()">
    <div class="mobile-sheet">
      <div class="mobile-sheet-handle"></div>
      <h3>Mais opções</h3>
      <div class="mobile-sheet-grid">
        <button class="sheet-item" data-tab="grupos"    onclick="switchTab('grupos');closeMobileMore()"><span>🗂️</span>Grupos</button>
        <button class="sheet-item" data-tab="previsoes" onclick="switchTab('previsoes');closeMobileMore()"><span>🔮</span>Previsões</button>
        <button class="sheet-item" data-tab="regras"    onclick="switchTab('regras');closeMobileMore()"><span>📖</span>Regras</button>
        <button class="sheet-item" data-tab="whatsapp"  onclick="switchTab('whatsapp');closeMobileMore()"><span>💬</span>WhatsApp</button>
      </div>
    </div>
  </div>

</div>

<!-- Modal conflito API vs manual -->
<div class="wa-modal-overlay" id="conflict-modal">
  <div class="wa-modal-box conflict-box">
    <div class="wa-modal-header">
      <span>⚠️ Conflito de resultado</span>
    </div>
    <div class="wa-modal-body">
      <p id="conflict-title" class="conflict-title"></p>
      <div class="conflict-options">
        <button class="btn-feat" id="conflict-manual" onclick="resolveConflict(false)"></button>
        <button class="btn-wa-send" id="conflict-api" onclick="resolveConflict(true)"></button>
      </div>
    </div>
  </div>
</div>

<!-- Modo apresentação (jantar) -->
<div class="presentation-overlay" id="presentation-overlay">
  <button class="pres-close" onclick="closePresentationMode()">✕</button>
  <div id="presentation-content"></div>
</div>

<!-- Modal WhatsApp -->
<div class="wa-modal-overlay" id="wa-modal" onclick="if(event.target===this)closeWAModal()">
  <div class="wa-modal-box">
    <div class="wa-modal-header">
      <span class="wa-modal-icon">💬</span>
      <span class="wa-modal-title-text" id="wa-modal-title">Resumo do Jogo</span>
      <button class="wa-modal-close" onclick="closeWAModal()">✕</button>
    </div>
    <div class="wa-modal-body">
      <div class="wa-preview" id="wa-modal-preview"></div>
      <textarea class="wa-textarea" id="wa-modal-textarea" readonly></textarea>
      <div class="wa-modal-actions">
        <button class="btn-copy" id="wa-modal-copy-btn" onclick="copyWAModal()">📋 Copiar</button>
        <button class="btn-wa-send" id="wa-modal-send-btn" onclick="sendWAModal()">💬 Abrir no WhatsApp</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/scoring.js"></script>
<script src="js/db.js"></script>
<script src="js/api.js"></script>
<script src="js/features.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
