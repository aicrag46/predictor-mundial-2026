<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#14532d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Predictor Parque Biológico — Mundial 2026</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="stylesheet" href="css/style.css?v=12" />
  <link rel="stylesheet" href="css/polish.css?v=12" />
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h2 class="login-title">Predictor 2026</h2>
    <p class="login-sub">Parque Biológico</p>
    <div id="login-error" class="login-error" style="display:none"></div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="o-teu@email.com" autocomplete="email" />
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="login-btn" onclick="doLogin()" id="login-btn">Entrar</button>
    <p class="login-note" id="login-note">A verificar sessão…</p>
  </div>
</div>

<div id="pull-indicator" class="pull-indicator">Sincronizar</div>

<div class="app-shell">

  <header class="app-header">
    <div class="header-brand">
      <div class="brand-text">
        <h1>Predictor 2026</h1>
        <p class="brand-sub">Parque Biológico</p>
      </div>
    </div>
    <div class="header-toolbar">
      <span id="api-status" class="api-status" style="display:none"></span>
      <button class="btn-icon btn-sync" id="btn-sync" onclick="apiFetch()" title="Sincronizar">Sync</button>
      <span id="header-user" class="header-user" style="display:none"></span>
      <div class="header-menu">
        <button class="btn-icon btn-menu-toggle" id="menu-toggle" onclick="toggleHeaderMenu()" aria-label="Menu">⋮</button>
        <div class="header-dropdown" id="header-dropdown">
          <button class="dropdown-item" onclick="exportClassificacaoImage();toggleHeaderMenu()">Exportar imagem</button>
          <button class="dropdown-item" onclick="exportBackupJSON();toggleHeaderMenu()">Backup</button>
          <button class="dropdown-item" onclick="openPresentationMode();toggleHeaderMenu()">Modo jantar</button>
          <button class="dropdown-item" onclick="shareNative(buildMsgClassificacao(getResultados()),'Classificação');toggleHeaderMenu()">Partilhar</button>
          <hr class="dropdown-sep" />
          <button class="dropdown-item danger" onclick="resetResultados();toggleHeaderMenu()">Reset resultados</button>
          <button class="dropdown-item danger" onclick="resetMataMata();toggleHeaderMenu()">Reset mata-mata</button>
          <button class="dropdown-item" id="btn-logout" onclick="doLogout();toggleHeaderMenu()" style="display:none">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <nav class="tabs-nav" aria-label="Navegação">
    <div class="tabs-track">
      <button class="tab-btn active" data-tab="classificacao" onclick="switchTab('classificacao')">Classificação</button>
      <button class="tab-btn"        data-tab="resultados"    onclick="switchTab('resultados')">Resultados</button>
      <button class="tab-btn"        data-tab="previsoes"     onclick="switchTab('previsoes')">Previsões</button>
      <button class="tab-btn"        data-tab="mais"          onclick="switchTab('mais')">Mais</button>
    </div>
  </nav>

  <main class="main-content">

    <div class="sub-nav" id="sub-nav">
      <button type="button" class="sub-nav-back" onclick="switchTab('mais')">← Mais</button>
      <span class="sub-nav-title" id="sub-nav-title"></span>
    </div>

    <div class="tab-content active" id="tab-classificacao">
      <div id="classificacao-content"></div>
    </div>

    <div class="tab-content" id="tab-resultados">
      <div id="resultados-content" class="resultados-list"></div>
    </div>

    <div class="tab-content" id="tab-previsoes">
      <div id="previsoes-content"></div>
    </div>

    <div class="tab-content" id="tab-mais">
      <div id="mais-content"></div>
    </div>

    <div class="tab-content" id="tab-revisao">
      <div id="revisao-content"></div>
    </div>

    <div class="tab-content" id="tab-grupos">
      <div id="grupos-content"></div>
    </div>

    <div class="tab-content" id="tab-matamata">
      <div id="matamata-content"></div>
    </div>

    <div class="tab-content" id="tab-regras">
      <div id="regras-content"></div>
    </div>

    <div class="tab-content" id="tab-whatsapp">
      <div id="whatsapp-content"></div>
    </div>

  </main>

  <nav class="mobile-nav" aria-label="Navegação">
    <button class="mobile-nav-btn active" data-tab="classificacao" onclick="switchTab('classificacao')"><small>Classificação</small></button>
    <button class="mobile-nav-btn"        data-tab="resultados"    onclick="switchTab('resultados')"><small>Resultados</small></button>
    <button class="mobile-nav-btn"        data-tab="previsoes"     onclick="switchTab('previsoes')"><small>Previsões</small></button>
    <button class="mobile-nav-btn"        data-tab="mais"          onclick="switchTab('mais')"><small>Mais</small></button>
  </nav>

</div>

<div class="wa-modal-overlay" id="conflict-modal">
  <div class="wa-modal-box conflict-box">
    <div class="wa-modal-header"><span>Conflito de resultado</span></div>
    <div class="wa-modal-body">
      <p id="conflict-title" class="conflict-title"></p>
      <div class="conflict-options">
        <button class="btn-feat" id="conflict-manual" onclick="resolveConflict(false)"></button>
        <button class="btn-wa-send" id="conflict-api" onclick="resolveConflict(true)"></button>
      </div>
    </div>
  </div>
</div>

<div class="presentation-overlay" id="presentation-overlay">
  <button class="pres-close" onclick="closePresentationMode()">×</button>
  <div id="presentation-content"></div>
</div>

<div class="wa-modal-overlay" id="wa-modal" onclick="if(event.target===this)closeWAModal()">
  <div class="wa-modal-box">
    <div class="wa-modal-header">
      <span class="wa-modal-title-text" id="wa-modal-title">Resumo do jogo</span>
      <button class="wa-modal-close" onclick="closeWAModal()" aria-label="Fechar">×</button>
    </div>
    <div class="wa-modal-body">
      <div class="wa-preview" id="wa-modal-preview"></div>
      <textarea class="wa-textarea" id="wa-modal-textarea" readonly></textarea>
      <div class="wa-modal-actions">
        <button class="btn-copy" id="wa-modal-copy-btn" onclick="copyWAModal()">Copiar</button>
        <button class="btn-wa-send" id="wa-modal-send-btn" onclick="sendWAModal()">WhatsApp</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/scoring.js"></script>
<script src="js/db.js"></script>
<script src="js/api.js"></script>
<script src="js/features.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
