<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predictor Parque Biológico — Mundial 2026</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ─── ECRÃ DE LOGIN ────────────────────────────────────────────────────── -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-trophy">🏆</div>
    <h2 class="login-title">Predictor Parque Biológico</h2>
    <p class="login-sub">Mundial 2026 · Acesso privado</p>
    <div id="login-error" class="login-error" style="display:none"></div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="o-teu@email.com" autocomplete="email" />
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="login-btn" onclick="doLogin()" id="login-btn">Entrar</button>
    <p class="login-note" id="login-note">A verificar sessão…</p>
  </div>
</div>

  <header class="app-header">
    <div class="header-title">
      <span class="header-trophy">🏆</span>
      <div>
        <h1>Predictor Parque Biológico — Mundial 2026</h1>
        <p>10 participantes · 72 jogos · 720 prognósticos · Fase de grupos + Mata-Mata</p>
      </div>
    </div>
    <div class="header-actions">
      <span id="header-user" class="header-user" style="display:none"></span>
      <button class="btn-reset" onclick="resetResultados()">🗑️ Reset Grupos</button>
      <button class="btn-reset" onclick="resetMataMata()">🗑️ Reset Mata-Mata</button>
      <button class="btn-logout" id="btn-logout" onclick="doLogout()" style="display:none">🚪 Sair</button>
    </div>
  </header>

  <nav class="tabs-nav">
    <button class="tab-btn active" data-tab="resultados"    onclick="switchTab('resultados')">⚽ Resultados</button>
    <button class="tab-btn"        data-tab="classificacao" onclick="switchTab('classificacao')">🏅 Classificação</button>
    <button class="tab-btn"        data-tab="revisao"       onclick="switchTab('revisao')">📊 Revisão Larga</button>
    <button class="tab-btn"        data-tab="grupos"        onclick="switchTab('grupos')">🗂️ Grupos</button>
    <button class="tab-btn"        data-tab="matamata"      onclick="switchTab('matamata')">⚔️ Mata-Mata</button>
    <button class="tab-btn"        data-tab="previsoes"     onclick="switchTab('previsoes')">🔮 Previsões</button>
    <button class="tab-btn"        data-tab="regras"        onclick="switchTab('regras')">📖 Regras</button>
    <button class="tab-btn"        data-tab="whatsapp"      onclick="switchTab('whatsapp')">💬 WhatsApp</button>
  </nav>

  <main class="main-content">

    <div class="tab-content active" id="tab-resultados">
      <div id="resultados-content" class="grupos-wrapper"></div>
    </div>

    <div class="tab-content" id="tab-classificacao">
      <div id="classificacao-content"></div>
    </div>

    <div class="tab-content" id="tab-revisao">
      <div id="revisao-content"></div>
    </div>

    <div class="tab-content" id="tab-grupos">
      <div id="grupos-content"></div>
    </div>

    <div class="tab-content" id="tab-matamata">
      <div id="matamata-content"></div>
    </div>

    <div class="tab-content" id="tab-previsoes">
      <div id="previsoes-content"></div>
    </div>

    <div class="tab-content" id="tab-regras">
      <div id="regras-content"></div>
    </div>

    <div class="tab-content" id="tab-whatsapp">
      <div id="whatsapp-content"></div>
    </div>

  </main>

  <!-- Modal Resumo WhatsApp por jogo -->
  <div class="wa-modal-overlay" id="wa-modal" onclick="if(event.target===this)closeWAModal()">
    <div class="wa-modal-box">
      <div class="wa-modal-header">
        <span class="wa-modal-icon">💬</span>
        <span class="wa-modal-title-text" id="wa-modal-title">Resumo do Jogo</span>
        <button class="wa-modal-close" onclick="closeWAModal()">✕</button>
      </div>
      <div class="wa-modal-body">
        <div class="wa-preview" id="wa-modal-preview"></div>
        <textarea class="wa-textarea" id="wa-modal-textarea" readonly></textarea>
        <button class="btn-copy" id="wa-modal-copy-btn" onclick="copyWAModal()">📋 Copiar para WhatsApp</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
